html,body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;background:#fff;color:#000;overflow-x:hidden}

.section{padding:16px;min-height:100vh}

.header{display:flex;flex-direction:column;gap:16px;margin-bottom:16px}

.header-sub{font-size:clamp(10px,1.5vw,15px);color:#888;margin-top:6px;max-width:320px;line-height:1.5}

.tabs{display:flex;padding:4px;border:1px solid #e5e5e5;border-radius:14px;overflow-x:auto;width:100%;gap:0}

.carousel-wrap{position:relative;width:100%}
.carousel{display:flex;overflow-x:auto;scroll-snap-type:x mandatory;gap:12px;padding:6px 4px 16px;-ms-overflow-style:none;scrollbar-width:none}
.carousel::-webkit-scrollbar{display:none}

    livrables:['couverture finale','fichier prêt à l\'emploi','export digital','adaptation print si prévue'],
    options:['déclinaisons formats : +100 €','illustration originale : +150 €','extraction merchandising : +230 €'],
    ideal:'Artistes voulant une couverture forte et une direction visuelle singulière.'
  }},
  {id:'plaquettes',title:'PLAQUETTES',subtitle:'Supports de présentation',price:'À partir de 350 €',delay:'1 semaine',icon:'file',tag:'Print',cat:'one-shot',
   desc:'Présenter vos services avec un support structuré, cohérent et soigné.',
   details:{
    obj:'Disposer d\'un support commercial clair et pro.',
    comprend:['conception sur mesure','hiérarchisation des contenus','mise en page professionnelle','cohérence identité visuelle','2 allers-retours inclus'],
    livrables:['plaquette format adapté','version numérique','pagination ajustable','version print-ready en option'],
    options:['page supplémentaire : +100 €','fichier prêt à imprimer : +50 €'],
    ideal:'Présenter une offre ou prolonger une identité sur un support physique.'
  }}
];

var TABS = [
  {id:'all',label:'Tout'},
  {id:'recurrent',label:'Récurrent'},
  {id:'one-shot',label:'Prestations'},
];

// ── STATE ──────────────────────────────────────────────────────
var activeTab = 'all';
var activeIdx = 0;

// ── HELPERS ───────────────────────────────────────────────────
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function filtered(){
  return activeTab === 'all' ? OFFERS : OFFERS.filter(function(o){ return o.cat === activeTab; });
}

// ── RENDER TABS ───────────────────────────────────────────────
function renderTabs(){
  var el = document.getElementById('tabs');
  el.innerHTML = TABS.map(function(t){
    return '<button class="tab'+(activeTab===t.id?' active':'')+'" data-tab="'+t.id+'">'+t.label+'</button>';
  }).join('');
  el.querySelectorAll('.tab').forEach(function(btn){
    btn.addEventListener('click', function(){
      activeTab = this.getAttribute('data-tab');
      activeIdx = 0;
      renderAll();
    });
  });
}

// ── RENDER CARDS ──────────────────────────────────────────────
function renderCards(){
  var list = filtered();
  var carousel = document.getElementById('carousel');
  carousel.innerHTML = list.map(function(o, i){
    return '<div class="card" data-i="'+i+'" tabindex="0">'+
      '<div class="card-top">'+
        '<div class="card-icon">'+(ICONS[o.icon]||ICONS.layout)+'</div>'+
        '<span class="card-tag'+(o.cat==='passive'?' digital':'')+'">'+esc(o.tag)+'</span>'+
      '</div>'+
      '<div class="card-body">'+
        '<h3 class="card-title">'+esc(o.title)+'</h3>'+
        '<p class="card-subtitle">'+esc(o.subtitle)+'</p>'+
        '<p class="card-desc">'+esc(o.desc)+'</p>'+
      '</div>'+
      '<div class="card-footer">'+
        '<div class="card-pricing">'+
          '<div><div class="price-label">Investissement</div><div class="price-val">'+esc(o.price)+'</div></div>'+
          '<div style="text-align:right"><div class="price-label">Délai</div><div class="delay-val">'+esc(o.delay)+'</div></div>'+
        '</div>'+
        '<div class="card-btns">'+
          '<button class="btn-detail" data-open="'+i+'">Détails</button>'+
          '<a class="btn-reserve" href="https://www.artaxstudio.fr/contact" target="_blank" rel="noopener">Réserver '+ICONS.arrow+'</a>'+
        '</div>'+
      '</div>'+
    '</div>';
  }).join('');

  // detail buttons
  carousel.querySelectorAll('.btn-detail').forEach(function(btn){
    btn.addEventListener('click', function(){
      openModal(parseInt(this.getAttribute('data-open')));
    });
  });

  // scroll → update dots
  carousel.addEventListener('scroll', function(){
    var list2 = filtered();
    var idx = Math.round(carousel.scrollLeft / (carousel.scrollWidth / list2.length));
    if(idx !== activeIdx){ activeIdx = idx; renderDots(); }
  }, {passive:true});
}

// ── RENDER DOTS ───────────────────────────────────────────────
function renderDots(){
  var list = filtered();
  var el = document.getElementById('dots');
  el.innerHTML = list.map(function(_,i){
    return '<button class="dot'+(i===activeIdx?' active':'')+'" data-di="'+i+'" aria-label="Slide '+(i+1)+'"></button>';
  }).join('');
  el.querySelectorAll('.dot').forEach(function(btn){
    btn.addEventListener('click', function(){
      var i = parseInt(this.getAttribute('data-di'));
      activeIdx = i;
      var carousel = document.getElementById('carousel');
      var iw = carousel.scrollWidth / filtered().length;
      carousel.scrollTo({left: iw * i, behavior:'smooth'});
      renderDots();
    });
  });
}

// ── MODAL ─────────────────────────────────────────────────────
function openModal(idx){
  var list = filtered();
  var o = list[idx];
  if(!o) return;
  var d = o.details;

  var comprend = (d.comprend||[]).map(function(c){
    return '<li><span class="dot-bullet"></span>'+esc(c)+'</li>';
  }).join('');

  var livrables = (d.livrables||[]).map(function(l){
    return '<li>• '+esc(l)+'</li>';
  }).join('');

  var tarifs = d.tarifs ? '<div><div class="micro-label">Formules</div><ul class="formules-list">'+
    d.tarifs.map(function(t){ return '<li>→ '+esc(t)+'</li>'; }).join('')+
  '</ul></div>' : '';

  var options = d.options ? '<p class="options-text">Options : '+esc(d.options.join(' — '))+'</p>' : '';

  document.getElementById('modal-content').innerHTML =
    '<span class="modal-badge">Offre détaillée</span>'+
    '<h3 class="modal-title">'+esc(o.title)+'</h3>'+
    '<p class="modal-sub">'+esc(o.subtitle)+'</p>'+
    '<div class="modal-objectif-box">'+
      '<p class="modal-objectif-text">"'+esc(d.obj)+'"</p>'+
      '<div class="micro-label">Ce que comprend l\'offre</div>'+
      '<ul class="comprend-list">'+comprend+'</ul>'+
    '</div>'+
    '<div class="modal-grid">'+
      '<div><div class="micro-label">Livrables</div><ul class="livrables-list">'+livrables+'</ul></div>'+
      tarifs+
    '</div>'+
    '<div class="modal-options">'+
      options+
      '<p class="ideal-text">Idéal pour : <span>'+esc(d.ideal)+'</span></p>'+
    '</div>'+
    '<div class="modal-footer">'+
      '<div><div class="price-label">Tarif indicatif</div><div class="modal-price-val">'+esc(o.price)+'</div></div>'+
      '<a class="btn-modal-reserve" href="https://www.artaxstudio.fr/contact" target="_blank" rel="noopener">'+
        'Contacter le Studio '+ICONS.pointer+
      '</a>'+
    '</div>';

  var overlay = document.getElementById('overlay');
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(){
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('overlay-bg').addEventListener('click', closeModal);
document.getElementById('modal-close').addEventListener('click', closeModal);
document.addEventListener('keydown', function(e){ if(e.key==='Escape') closeModal(); });

// ── INIT ──────────────────────────────────────────────────────
function renderAll(){
  renderTabs();
  renderCards();
  renderDots();
}

renderAll();
</script>
</body>
</html>
